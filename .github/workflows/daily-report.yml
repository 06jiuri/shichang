          fi

      - name: Run or skip
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPORT_TYPE: ${{ steps.decide.outputs.report_type }}
          IS_MANUAL: ${{ steps.decide.outputs.is_manual }}
        run: |
          if [ "${{ steps.decide.outputs.script }}" = "skip" ]; then
            exit 0
          fi
          if [ "${{ steps.decide.outputs.script }}" = "weekly" ]; then
            python weekly.py
          elif [ "${{ steps.decide.outputs.script }}" = "main" ]; then
            python main.py
          else
            python news.py
          fi
